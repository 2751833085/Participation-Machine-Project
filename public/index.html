  <script>
    (function () {
      var k = "tm-theme";

      var t =
        s === "light" || s === "dark"
          ? s
          : window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
      document.documentElement.dataset.theme = t;
    })();
  </script>
