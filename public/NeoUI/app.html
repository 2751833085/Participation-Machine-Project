<!DOCTYPE html>
<html lang="en" data-app-build="modular-20260505-fixups">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Tourgo — timed photo scavenger hunts for NYC explorers.">
  <title>Tourgo NeoUI</title>
  <script>
    (function () {
      var colorKey = "tm-theme";
      var uiThemeKey = "tm-ui-theme";
      var validUiThemes = { "neo-design": 1 };
      var storedUi = localStorage.getItem(uiThemeKey);
      if (storedUi === "material-design") {
        storedUi = "neo-design";
        localStorage.setItem(uiThemeKey, storedUi);
      }
      var uiTheme = validUiThemes[storedUi] ? storedUi : "neo-design";
      var s = localStorage.getItem(colorKey);
      var t =
        s === "light" || s === "dark"
          ? s
          : window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light";
      document.documentElement.dataset.theme = t;
      document.documentElement.dataset.uiTheme = uiTheme;
      document.documentElement.classList.toggle("dark", t === "dark");
      document.documentElement.classList.toggle("light", t === "light");
      document.documentElement.style.colorScheme = t === "dark" ? "dark" : "light";
      var csMeta = document.querySelector('meta[name="color-scheme"]');
      if (csMeta) csMeta.setAttribute("content", t === "dark" ? "dark light" : "light dark");
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://www.google.com">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="../css/app.css?v=20260505-fixups">
</head>
