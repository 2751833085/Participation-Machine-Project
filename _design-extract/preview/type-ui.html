<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "DM Sans", sans-serif; background: #f3ece2; padding: 16px; color: #221e1a; }
.row { padding: 7px 0; border-bottom: 1px solid #dcd3c4; display: flex; align-items: baseline; gap: 12px; }
.row:last-child { border-bottom: none; }
.meta { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: #9a9288; min-width: 68px; flex-shrink: 0; }
.body-sample { font-size: 1rem; line-height: 1.55; }
.lead-sample { font-size: 0.95rem; color: #5e564c; }
.sm-sample { font-size: 0.88rem; color: #5e564c; }
.label-sample { font-size: 0.78rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: #5e564c; }
.badge-sample { font-size: 0.65rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; background: rgba(92,74,56,.14); color: #5c4a38; padding: 3px 6px; border-radius: 4px; }
.caption-sample { font-size: 0.58rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; color: #5e564c; }
.btn-sample { font-size: 0.875rem; font-weight: 600; letter-spacing: .02em; }
</style>
</head>
<body>
  <div class="row"><span class="meta">Body</span><span class="body-sample">Timed photo hunts on Manhattan streets.</span></div>
  <div class="row"><span class="meta">Lead</span><span class="lead-sample">Open a listing to preview checkpoints, then start the clock.</span></div>
  <div class="row"><span class="meta">Small</span><span class="sm-sample">5 checkpoints · 30 min · NYC</span></div>
  <div class="row"><span class="meta">Form label</span><span class="label-sample">Hunt title</span></div>
  <div class="row"><span class="meta">Button</span><span class="btn-sample">Start hunt</span></div>
  <div class="row"><span class="meta">Badge</span><span class="badge-sample">Manhattan</span></div>
  <div class="row"><span class="meta">Caption</span><span class="caption-sample">Hunts · Saved · Create · Rank · Profile</span></div>
</body>
</html>
