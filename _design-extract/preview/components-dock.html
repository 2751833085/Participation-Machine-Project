<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --surface: #fdf9f3; --surface-2: #efe8dc; --bg: #f3ece2;
  --text: #221e1a; --text-muted: #5e564c;
  --border: #dcd3c4; --accent: #5c4a38; --accent-hover: #453624;
  --accent-soft: rgba(92,74,56,.14);
  --radius-sm: 10px;
}
body { font-family: "DM Sans", sans-serif; background: var(--bg); padding: 0; color: var(--text); display: flex; flex-direction: column; }
.mock-screen { background: var(--bg); height: 90px; display: flex; align-items: center; justify-content: center; font-size: .85rem; color: var(--text-muted); }
.dock {
  display: flex; justify-content: center; align-items: stretch;
  background: color-mix(in srgb,var(--surface) 94%,transparent);
  border-top: 1px solid color-mix(in srgb,var(--border) 80%,rgba(92,74,56,.1));
  backdrop-filter: blur(16px);
  padding: 4px 6px 14px;
}
.dock-inner {
  display: grid;
  grid-template-columns: 1fr 1fr auto 1fr 1fr;
  column-gap: min(0.35rem, 1.5vw);
  width: 100%; max-width: 420px;
  align-items: center;
}
.tab {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; padding: 6px 4px 4px;
  border-radius: var(--radius-sm);
  color: var(--text-muted); text-decoration: none;
  border: 1px solid transparent;
  min-height: 52px;
}
.tab.active { color: var(--text); }
.tab .tab-icon { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; transition: transform .2s; }
.tab.active .tab-icon { transform: scale(1.06); }
.tab-label { font-size: .6rem; font-weight: 600; letter-spacing: .04em; line-height: 1.2; text-align: center; }
.tab.active .tab-label { color: var(--text); }
.fab {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 3px; color: var(--text-muted);
  padding: 2px 0 4px;
}
.fab-circle {
  width: 50px; height: 50px; border-radius: 50%;
  background: linear-gradient(145deg, var(--accent-hover), var(--accent));
  color: #fdf9f3; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(92,74,56,.42), 0 0 0 1px rgba(255,255,255,.12) inset;
  transition: transform .22s;
}
.fab:hover .fab-circle { transform: scale(1.05); }
.fab-label { font-size: .6rem; font-weight: 600; letter-spacing: .04em; line-height: 1.2; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="mock-screen">App content area</div>
  <div class="dock">
    <div class="dock-inner">
      <!-- Hunts (active) — outer: drop slightly -->
      <a class="tab active" href="#" style="transform:translateY(0.3rem)">
        <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span>
        <span class="tab-label">Hunts</span>
      </a>
      <!-- Saved — inner: nudge left + drop -->
      <a class="tab" href="#" style="transform:translate(-0.42rem, 0.3rem)">
        <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg></span>
        <span class="tab-label">Saved</span>
      </a>
      <!-- Create FAB — center: barely drop -->
      <a class="fab" href="#" style="transform:translateY(0.16rem)">
        <div class="fab-circle">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.25" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </div>
        <span class="fab-label">Create</span>
      </a>
      <!-- Rank — inner: nudge right + drop -->
      <a class="tab" href="#" style="transform:translate(0.42rem, 0.3rem)">
        <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><rect x="4" y="10" width="5" height="11" rx="1"/><rect x="15" y="6" width="5" height="15" rx="1"/><rect x="9.5" y="14" width="5" height="7" rx="1"/></svg></span>
        <span class="tab-label">Rank</span>
      </a>
      <!-- Profile — outer: drop slightly -->
      <a class="tab" href="#" style="transform:translateY(0.3rem)">
        <span class="tab-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20a8 8 0 0 1 16 0"/></svg></span>
        <span class="tab-label">Profile</span>
      </a>
    </div>
  </div>
</body>
</html>
